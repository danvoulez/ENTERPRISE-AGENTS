<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Dual Agents Dashboard</title></head>
  <body>
    <h1>Dual Agents</h1>
    <pre id="out"></pre>
    <script>
      const out = document.getElementById('out');
      const evt = new EventSource('/events');
      evt.onmessage = (e) => {
        out.textContent = `${e.data}\n` + out.textContent;
      };
    </script>
  </body>
</html>
